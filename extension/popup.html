<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EB Finder</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 320px;
        padding: 16px;
        background: #ffffff;
        color: #1a1a1a;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .header h1 {
        font-size: 16px;
        margin: 0;
        font-weight: 700;
      }
      .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
        background: #0f1e82;
        color: #ffffff;
      }
      .status {
        padding: 12px;
        border-radius: 8px;
        background: #f3f4f6;
        margin-bottom: 12px;
        font-size: 14px;
        line-height: 1.4;
      }
      .status.match {
        background: #ecfdf5;
        color: #065f46;
      }
      .status.no-match {
        background: #f3f4f6;
        color: #374151;
      }
      .status strong {
        display: block;
        margin-bottom: 4px;
        font-size: 15px;
      }
      .cta {
        display: block;
        text-align: center;
        background: #0f1e82;
        color: #ffffff;
        text-decoration: none;
        padding: 10px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 12px;
      }
      .match-list {
        list-style: none;
        padding: 0;
        margin: 0 0 12px 0;
        display: none;
        flex-direction: column;
        gap: 4px;
        max-height: 280px;
        overflow-y: auto;
      }
      .match-list.visible {
        display: flex;
      }
      .match-list li {
        margin: 0;
      }
      .match-list li a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 6px;
        background: #f3f4f6;
        text-decoration: none;
        color: #1f2937;
        font-size: 13px;
      }
      .match-list li a:hover {
        background: #e5e7eb;
      }
      .match-list .shop-name {
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1 1 auto;
        min-width: 0;
      }
      .match-list .shop-points {
        color: #0f1e82;
        font-weight: 700;
        font-size: 12px;
        flex-shrink: 0;
      }
      .match-list .shop-points.placeholder {
        color: #9ca3af;
        font-weight: 400;
      }
      .disclaimer {
        font-size: 11px;
        color: #6b7280;
        line-height: 1.4;
        border-top: 1px solid #e5e7eb;
        padding-top: 10px;
      }
      .disclaimer a {
        color: #0f1e82;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>EB Finder</h1>
      <span class="badge">SE</span>
    </div>
    <div id="status" class="status">Söker partner…</div>
    <ul id="match-list" class="match-list"></ul>
    <a
      id="cta"
      class="cta"
      href="#"
      target="_blank"
      rel="noopener noreferrer"
      style="display: none"
      >LOGGA IN & TJÄNA</a
    >
    <p class="disclaimer">
      EB Finder är inte officiellt anslutet till SAS – Scandinavian Airlines
      eller EuroBonus.
    </p>
    <p class="disclaimer credit">
      Skapat av
      <a href="https://www.brine.co" target="_blank" rel="noopener noreferrer"
        >Brine AB</a
      >
      <a
        href="https://github.com/brinehq/eb-finder"
        target="_blank"
        rel="noopener noreferrer"
        >Källkod</a
      >
    </p>
    <script src="popup.js"></script>
  </body>
</html>
